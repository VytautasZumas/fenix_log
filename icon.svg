<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0b0e" />
      <stop offset="100%" stop-color="#14171f" />
    </linearGradient>
    
    <!-- Blockchain Fire Gradient -->
    <linearGradient id="blockFire" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ea580c" />
      <stop offset="100%" stop-color="#fdba74" />
    </linearGradient>
    
    <!-- Link Lines Glow -->
    <filter id="glow1" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Icon Base -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad1)" stroke="#222733" stroke-width="4" />
  
  <!-- Symmetrical Blockchain Node Connections in Background -->
  <g stroke="#ffffff" stroke-opacity="0.08" stroke-width="3" fill="none">
    <circle cx="256" cy="180" r="6" fill="#ffffff" fill-opacity="0.1" />
    <circle cx="156" cy="230" r="6" fill="#ffffff" fill-opacity="0.1" />
    <circle cx="356" cy="230" r="6" fill="#ffffff" fill-opacity="0.1" />
    <circle cx="206" cy="350" r="6" fill="#ffffff" fill-opacity="0.1" />
    <circle cx="306" cy="350" r="6" fill="#ffffff" fill-opacity="0.1" />
    <line x1="256" y1="180" x2="156" y2="230" />
    <line x1="256" y1="180" x2="356" y2="230" />
    <line x1="156" y1="230" x2="206" y2="350" />
    <line x1="356" y1="230" x2="306" y2="350" />
    <line x1="206" y1="350" x2="306" y2="350" />
  </g>
  
  <!-- Blockchain Phoenix (Body & Wings made of connected 3D blocks) -->
  <g filter="url(#glow1)" transform="translate(0, 10)">
    <!-- Central Block (Body) -->
    <path d="M 256 220 L 296 240 L 296 280 L 256 300 L 216 280 L 216 240 Z" fill="url(#blockFire)" />
    <!-- Center Block Top Cap lines for 3D look -->
    <path d="M 256 220 L 216 240 L 256 260 L 296 240 Z" fill="#ffedd5" opacity="0.3" />
    <path d="M 256 260 L 256 300" fill="none" stroke="#000" stroke-width="1.5" opacity="0.2" />
    
    <!-- Top Block (Head/Crest) -->
    <path d="M 256 120 L 280 132 L 280 156 L 256 168 L 232 156 L 232 132 Z" fill="url(#blockFire)" />
    <path d="M 256 120 L 232 132 L 256 144 L 280 132 Z" fill="#ffedd5" opacity="0.3" />
    <!-- Connector Link (Neck) -->
    <line x1="256" y1="168" x2="256" y2="220" stroke="#fdba74" stroke-width="8" stroke-linecap="round" />
    
    <!-- Left Wing Block 1 -->
    <path d="M 176 170 L 206 185 L 206 215 L 176 230 L 146 215 L 146 185 Z" fill="url(#blockFire)" opacity="0.9" />
    <path d="M 176 170 L 146 185 L 176 200 L 206 185 Z" fill="#ffedd5" opacity="0.3" />
    <!-- Connector Link (Body to Left Wing 1) -->
    <line x1="216" y1="240" x2="206" y2="215" stroke="#fdba74" stroke-width="6" stroke-linecap="round" />
    
    <!-- Left Wing Block 2 (Outer/Lower) -->
    <path d="M 116 230 L 140 242 L 140 266 L 116 278 L 92 266 L 92 242 Z" fill="url(#blockFire)" opacity="0.8" />
    <path d="M 116 230 L 92 242 L 116 254 L 140 242 Z" fill="#ffedd5" opacity="0.3" />
    <!-- Connector Link (Wing 1 to Wing 2) -->
    <line x1="146" y1="215" x2="140" y2="242" stroke="#fdba74" stroke-width="5" stroke-linecap="round" />
    
    <!-- Right Wing Block 1 -->
    <path d="M 336 170 L 366 185 L 366 215 L 336 230 L 306 215 L 306 185 Z" fill="url(#blockFire)" opacity="0.9" />
    <path d="M 336 170 L 306 185 L 336 200 L 366 185 Z" fill="#ffedd5" opacity="0.3" />
    <!-- Connector Link (Body to Right Wing 1) -->
    <line x1="296" y1="240" x2="306" y2="215" stroke="#fdba74" stroke-width="6" stroke-linecap="round" />
    
    <!-- Right Wing Block 2 (Outer/Lower) -->
    <path d="M 396 230 L 420 242 L 420 266 L 396 278 L 372 266 L 372 242 Z" fill="url(#blockFire)" opacity="0.8" />
    <path d="M 396 230 L 372 242 L 396 254 L 420 242 Z" fill="#ffedd5" opacity="0.3" />
    <!-- Connector Link (Wing 1 to Wing 2) -->
    <line x1="326" y1="215" x2="372" y2="242" stroke="#fdba74" stroke-width="5" stroke-linecap="round" />
    
    <!-- Tail Block (Chain link downward) -->
    <path d="M 256 325 L 280 337 L 280 361 L 256 373 L 232 361 L 232 337 Z" fill="url(#blockFire)" opacity="0.9" />
    <path d="M 256 325 L 232 337 L 256 349 L 280 337 Z" fill="#ffedd5" opacity="0.3" />
    <!-- Connector Link (Body to Tail) -->
    <line x1="256" y1="300" x2="256" y2="325" stroke="#fdba74" stroke-width="8" stroke-linecap="round" />
  </g>
</svg>
